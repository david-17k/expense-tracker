<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenditure Tracker</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #8e2de2, #4a00e0);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    .tracker {
      background: #fff;
      color: #333;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      color: #4a00e0;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    input {
      background: #f0f0f0;
    }

    button {
      background-color: #8e2de2;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #6b21c5;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #f7f7f7;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .summary {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
    }

    .expense-item {
      width: 100%;
    }

    .expense-meta {
      font-size: 0.9em;
      color: #666;
    }

    .buttons {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }

    .buttons button {
      background-color: #ddd;
      color: #333;
      font-size: 0.9em;
      padding: 4px 8px;
    }

    .buttons button:hover {
      background-color: #bbb;
    }
  </style>
</head>
<body>
  <div class="tracker">
    <h1>💰 Expenditure Tracker</h1>
    <input type="text" id="item" placeholder="Item Name">
    <input type="number" id="amount" placeholder="Amount">
    <input type="date" id="date">
    <button onclick="addExpense()">Add Expense</button>
    <ul id="expenseList"></ul>
    <div class="summary">Total Spent: ₹<span id="total">0</span></div>
  </div>

  <script>
    const itemInput = document.getElementById("item");
    const amountInput = document.getElementById("amount");
    const dateInput = document.getElementById("date");
    const expenseList = document.getElementById("expenseList");
    const totalDisplay = document.getElementById("total");
    let total = 0;
    let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

    function addExpense() {
      const item = itemInput.value.trim();
      const amount = parseFloat(amountInput.value);
      const date = dateInput.value;

      if (!item || isNaN(amount) || amount <= 0 || !date) return;

      const expense = { item, amount, date };
      expenses.push(expense);
      localStorage.setItem("expenses", JSON.stringify(expenses));
      renderExpenses();

      itemInput.value = "";
      amountInput.value = "";
      dateInput.value = "";
    }

    function renderExpenses() {
      expenseList.innerHTML = "";
      total = 0;

      expenses.forEach((expense, index) => {
        total += expense.amount;

        const li = document.createElement("li");

        const content = document.createElement("div");
        content.classList.add("expense-item");
        content.innerHTML = `<strong>${expense.item}</strong> - ₹${expense.amount.toFixed(2)}<br><span class="expense-meta">${expense.date}</span>`;

        const buttons = document.createElement("div");
        buttons.className = "buttons";

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = () => {
          expenses.splice(index, 1);
          localStorage.setItem("expenses", JSON.stringify(expenses));
          renderExpenses();
        };

        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.onclick = () => {
          const newItem = prompt("Edit Item:", expense.item);
          const newAmount = parseFloat(prompt("Edit Amount:", expense.amount));
          const newDate = prompt("Edit Date:", expense.date);
          if (newItem && !isNaN(newAmount) && newAmount > 0 && newDate) {
            expenses[index] = { item: newItem, amount: newAmount, date: newDate };
            localStorage.setItem("expenses", JSON.stringify(expenses));
            renderExpenses();
          }
        };

        buttons.appendChild(editBtn);
        buttons.appendChild(deleteBtn);

        li.appendChild(content);
        li.appendChild(buttons);
        expenseList.appendChild(li);
      });

      totalDisplay.textContent = total.toFixed(2);
    }

    // Load on start
    renderExpenses();
  </script>
</body>
</html>
